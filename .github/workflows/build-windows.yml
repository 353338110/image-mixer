name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows Installer
        shell: pwsh
        run: |
          cmd /c "scripts\package_all.bat > build-windows.log 2>&1"
          $exitCode = $LASTEXITCODE
          Get-Content build-windows.log
          if ($exitCode -ne 0) {
            exit $exitCode
          }

      - name: Locate Installer
        shell: pwsh
        run: |
          Write-Host "Workspace: $pwd"
          Get-ChildItem -Path . -Recurse -File -Filter "ImageMixer-Setup.exe" | Select-Object FullName, Length

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: ImageMixer-Windows-Installer
          if-no-files-found: error
          path: |
            dist/ImageMixer-Setup.exe
            scripts/dist/ImageMixer-Setup.exe
            **/ImageMixer-Setup.exe

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ImageMixer-Windows-Build-Log
          if-no-files-found: error
          path: build-windows.log
